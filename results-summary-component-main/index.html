<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main>
      <article class="main-content">
        <section class="results">
          <h1 class="results-title">Your Result</h1>
          <div class="results-score">
            <span class="results-score-number">76</span>
            <span class="results-score-total">of 100</span>
          </div>
          <div class="results-evaluation-container">
            <h2 class="results-evaluation">Great</h2>
            <p class="results-description">
              You scored higher than 65% of the people who have taken these
              tests.
            </p>
          </div>
        </section>

        <section class="summary-section">
          <h2 class="summary-title">Summary</h2>
          <ul class="summary-container">
            <li class="summary-item">
              <div class="summary-item-label">
                <img
                  src="./assets/images/icon-reaction.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span>Reaction</span>
              </div>
              <p class="summary-item-number"><span>80</span> / 100</p>
            </li>

            <li class="summary-item">
              <div class="summary-item-label">
                <img
                  src="./assets/images/icon-memory.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span>Memory</span>
              </div>
              <p class="summary-item-number"><span>92</span> / 100</p>
            </li>

            <li class="summary-item">
              <div class="summary-item-label">
                <img
                  src="./assets/images/icon-verbal.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span>Verbal</span>
              </div>
              <p class="summary-item-number"><span>61</span> / 100</p>
            </li>

            <li class="summary-item">
              <div class="summary-item-label">
                <img
                  src="./assets/images/icon-visual.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span>Visual</span>
              </div>
              <p class="summary-item-number"><span>72</span> / 100</p>
            </li>
          </ul>
          <button type="button" class="btn">Continue</button>
        </section>
      </article>
    </main>
  </body>
</html>
