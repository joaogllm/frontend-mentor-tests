<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <section class="profile">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall"
          class="profile__avatar"
          width="88"
          height="88"
        />
        <h1 class="profile__name">Jessica Randall</h1>
        <p class="profile__location">London, United Kingdom</p>
        <p class="profile__bio">"Front-end developer and avid reader"</p>
        <ul class="profile__links">
          <li><a href="#" aria-label="Jessica's GitHub profile">GitHub</a></li>
          <li>
            <a href="#" aria-label="Jessica's Frontend Mentor profile"
              >Frontend Mentor</a
            >
          </li>
          <li>
            <a href="#" aria-label="Jessica's LinkedIn profile">LinkedIn</a>
          </li>
          <li>
            <a href="#" aria-label="Jessica's Twitter profile">Twitter</a>
          </li>
          <li>
            <a href="#" aria-label="Jessica's Instagram profile">Instagram</a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
