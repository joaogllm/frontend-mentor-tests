<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Lexend+Deca:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Stats preview card component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="card-container">
        <picture class="card-image">
          <source
            media="(min-width: 900px)"
            srcset="./images/image-header-desktop.jpg"
          />
          <img
            src="./images/image-header-mobile.jpg"
            alt="A person looking at a laptop screen with data analytics on it."
          />
        </picture>
        <div class="card-content">
          <h1 class="card-title">
            Get <span class="card-title-highlight">insights</span> that help
            your business grow.
          </h1>

          <p class="card-description">
            Discover the benefits of data analytics and make better decisions
            regarding revenue, customer experience, and overall efficiency.
          </p>

          <dl class="card-info">
            <div class="card-info-item">
              <dt>10k+</dt>
              <dd>companies</dd>
            </div>
            <div class="card-info-item">
              <dt>314</dt>
              <dd>templates</dd>
            </div>
            <div class="card-info-item">
              <dt>12m+</dt>
              <dd>queries</dd>
            </div>
          </dl>
        </div>
      </div>
    </main>
  </body>
</html>
