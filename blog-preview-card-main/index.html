<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <article class="blog-card">
        <img
          src="./assets/images/illustration-article.svg"
          alt="article illustration"
          class="blog-card-image"
        />
        <div class="blog-card-main-content">
          <span class="blog-card-category">Learning</span>
          <time class="blog-card-date" datetime="2023-12-21"
            >Published 21 Dec 2023</time
          >
          <h1 class="blog-card-title">HTML & CSS foundations</h1>
          <p class="blog-card-text">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <footer class="blog-card-user">
          <img
            src="./assets/images/image-avatar.webp"
            alt="a person picture"
            class="author-image"
          />
          <p class="author-name">Greg Hooper</p>
        </footer>
      </article>
    </main>
  </body>
</html>
